<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Challenge 2</title>

  <style>
    body {
      background: white;
    }

    .container {
      border: 6px solid blue;
      background: pink;
      padding: 10px;
      display: inline-block;
      font-size: 48px;
    }

    .word {
      margin-right: 1px;
    }

    .red { color: red; }
    .orange { color: orange; }
    .yellow { color: gold; }
    .green { color: green; }
    .blue { color: blue; }

    .box {
      background: black;
      border: 6px solid green;
      padding: 5px 5px;
    }

    .purple { color: purple; }
    .white { color: pink; }
    .gray { color: lightgray; }
    .light { color: white; }
  </style>

</head>
<body>

<div class="container">
  <span class="word red">The</span>
  <span class="word orange">quick</span>
  <span class="word yellow">brown</span>
  <span class="word green">fox</span>
  <span class="word blue">jumps</span>

  <span class="box">
    <span class="purple">over</span>
    <span class="white">the</span>
    <span class="gray">lazy</span>
    <span class="light">dog.</span>
  </span>
</div>

</body>
</html>
